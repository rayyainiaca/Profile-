<!DOCTYPE html>
<html>
<head>
    <title>Mini WebGIS Rayya</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        h2 {
            padding: 10px;
        }

        #map {
            width: 100%;
            height: 500px; /* 🔥 WAJIB */
        }

        button {
            margin: 5px;
            padding: 8px;
        }
    </style>
</head>

<body>

<h2>Mini WebGIS Rayya</h2>

<button onclick="addMarker()">Add Marker</button>
<button onclick="clearMarker()">Clear All Markers</button>
<button onclick="toggleLayer()">Toggle Layer</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// pastikan halaman sudah siap
document.addEventListener("DOMContentLoaded", function(){

    // ================= MAP =================
    var map = L.map('map').setView([-7.8, 110.37], 12);

    // basemap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // ================= MARKER =================
    let markers = [];
    let tampil = true;

    // tambah marker
    window.addMarker = function(){
        let lat = -7.8 + (Math.random() * 0.02);
        let lng = 110.37 + (Math.random() * 0.02);

        let marker = L.marker([lat, lng]).addTo(map)
            .bindPopup("Koordinat:<br>" + lat.toFixed(5) + ", " + lng.toFixed(5));

        markers.push(marker);
    }

    // clear marker
    window.clearMarker = function(){
        markers.forEach(function(m){
            map.removeLayer(m);
        });
        markers = [];
    }

    // toggle marker
    window.toggleLayer = function(){
        tampil = !tampil;

        markers.forEach(function(m){
            if(tampil){
                m.addTo(map);
            } else {
                map.removeLayer(m);
            }
        });
    }

});
</script>

</body>
</html>
